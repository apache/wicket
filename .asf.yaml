github:
  description: "Apache Wicket - Component-based Java web framework"
  homepage: https://wicket.apache.org/
  labels:
    - apache
    - java
    - web
    - html

  rulesets:
    - name: "Default Branch Protection"
      type: branch
      branches:
        includes:
          - "~DEFAULT_BRANCH"
          - "release/*"
          - "rel/*"
        excludes: []
      bypass_teams:
        - root
      restrict_deletion: true
      restrict_force_push: true
notifications:
  commits: commits@wicket.apache.org
  pullrequests: commits@wicket.apache.org
  jira_options: link label comment
